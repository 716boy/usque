name: build-android-arm64

on:
  push:
    branches: [ "main", "tests" ]
  pull_request:
    branches: [ "main", "tests" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build libusque.so (android/arm64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
          cache: true

      - name: Show Go env
        run: go version && go env

      - name: Download modules
        run: go mod download

      - name: Build libusque.so (CGO_ENABLED=0, GOOS=android, GOARCH=arm64)
        env:
          CGO_ENABLED: '0'
          GOOS: android
          GOARCH: arm64
        run: |
          set -euxo pipefail
          # -X runtime.godebugDefault=vgetrandom=off bakes the GODEBUG
          # default into the binary so the Android linker's vDSO
          # getrandom path is bypassed at startup. -s -w strips symbols.
          go build \
            -trimpath \
            -ldflags="-s -w -X runtime.godebugDefault=vgetrandom=off" \
            -o libusque.so \
            .
          ls -lah libusque.so
          file libusque.so || true
          sha256sum libusque.so | tee libusque.so.sha256

      - name: Upload libusque.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libusque-android-arm64
          path: |
            libusque.so
            libusque.so.sha256
          if-no-files-found: error
          retention-days: 30
